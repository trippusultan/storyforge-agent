[theme]
base = "dark"

# Editorial-matte dark: warm ink background, bone text, single clay/terracotta accent.
primaryColor = "#C2613F"
backgroundColor = "#14110F"
secondaryBackgroundColor = "#1E1A17"
textColor = "#EDE6DD"
# Semantic palette (named colors used by Streamlit widgets/charts)
redColor = "#C75B4A"
orangeColor = "#C2613F"
yellowColor = "#D9A441"
greenColor = "#7C9A78"
blueColor = "#8FA8C0"
violetColor = "#A98BB0"
grayColor = "#8A8178"

[theme.sidebar]
backgroundColor = "#191512"
